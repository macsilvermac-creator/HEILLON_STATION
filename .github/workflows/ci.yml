name: CI — Heillon Legal

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. LINT — ruff (format + lint) + mypy type check
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy

      - name: ruff format check
        run: ruff format --check .

      - name: ruff lint
        run: ruff check .

      - name: mypy type check
        run: |
          mypy app \
            --ignore-missing-imports \
            --no-strict-optional \
            --warn-return-any \
            --warn-unused-ignores \
            --pretty \
            || true   # warn but don't block CI — mypy findings go to summary
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # 2. SECURITY SCAN — bandit (SAST) + pip-audit (deps CVEs)
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install tools
        run: pip install bandit pip-audit

      - name: bandit SAST scan
        run: |
          bandit -r app \
            --severity-level medium \
            --confidence-level medium \
            --exclude app/tests \
            -f txt \
            || true   # report but don't block
        continue-on-error: true

      - name: pip-audit (CVE scan)
        run: |
          pip install -r requirements.txt
          pip-audit --desc --output-format columns || true
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # 3. BACKEND TESTS — SQLite (fast, no services)
  # ──────────────────────────────────────────────────────────────────────────
  backend-sqlite:
    name: Backend Tests (SQLite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run tests + coverage
        env:
          DATABASE_TYPE: sqlite
          ENVIRONMENT: development
          FORCE_STUB_TIMESTAMP: "true"
        run: |
          python -m pytest -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-sqlite
          path: backend/coverage.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 4. BACKEND TESTS — PostgreSQL (production-equivalent)
  # ──────────────────────────────────────────────────────────────────────────
  backend-postgres:
    name: Backend Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: heillon_test
          POSTGRES_USER: heillon
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U heillon -d heillon_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_TYPE: postgresql
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: heillon_test
      POSTGRES_USER: heillon
      POSTGRES_PASSWORD: testpass
      POSTGRES_SSL_MODE: disable
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: development
      FORCE_STUB_TIMESTAMP: "true"
      AUTH_SECRET_KEY: ci-test-secret-minimum-32-characters-ok
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Wait for Postgres and bootstrap schema
        run: |
          for attempt in $(seq 1 30); do
            python -c "
          from app.core.config import get_settings
          from app.db.database import init_database
          init_database(get_settings())
          print('schema-ok')
          " && break
            echo "Aguardar Postgres ($attempt/30)…"
            sleep 2
          done

      - name: Verify corpus seed
        run: |
          python -c "
          from app.core.config import get_settings
          from app.db.compat import open_connection
          from app.domain.normative.corpus_seed import CORPUS_VERSION, ALL_CORPUS_RULES
          settings = get_settings()
          with open_connection(settings) as conn:
              rows = conn.execute('SELECT COUNT(*) as cnt FROM normative_rules').fetchone()
              cnt = rows[0] if rows else 0
              print(f'Corpus: {cnt} rules loaded (expected {len(ALL_CORPUS_RULES)}, version {CORPUS_VERSION})')
              assert cnt >= len(ALL_CORPUS_RULES), f'Expected >= {len(ALL_CORPUS_RULES)} rules, got {cnt}'
          print('corpus-seed-ok')
          "

      - name: Run full test suite (Postgres)
        run: |
          python -m pytest -q \
            --cov=app \
            --cov-report=xml:coverage-pg.xml \
            --tb=short \
            -x

      - name: Upload Postgres coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-postgres
          path: backend/coverage-pg.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 5. FRONTEND BUILD — Next.js 15 TypeScript
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Check route count
        working-directory: frontend
        run: |
          ROUTES=$(find .next/server/app -name "*.html" -o -name "page.js" 2>/dev/null | wc -l || echo "0")
          echo "Frontend routes built: $ROUTES"

  # ──────────────────────────────────────────────────────────────────────────
  # 6. E2E — Playwright (backend + frontend integrados)
  # ──────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-sqlite, frontend]
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Initialize database + seed corpus
        working-directory: backend
        env:
          DATABASE_TYPE: sqlite
          DATABASE_URL: sqlite:////tmp/heillon_e2e.db
          ENVIRONMENT: development
          FORCE_STUB_TIMESTAMP: "true"
        run: |
          python -c "
          from app.core.config import get_settings
          from app.db.database import init_database
          init_database(get_settings())
          print('e2e-db-ok')
          "

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_TYPE: sqlite
          DATABASE_URL: sqlite:////tmp/heillon_e2e.db
          REDIS_URL: redis://localhost:6379/0
          AUTH_SECRET_KEY: ci-e2e-secret-key-minimum-32-characters-long
          ENVIRONMENT: development
          FORCE_STUB_TIMESTAMP: "true"
          CI_E2E: "true"
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for attempt in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && break
            echo "Aguardar backend ($attempt/30)…"
            sleep 2
          done

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        working-directory: frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:8000
          BACKEND_PROXY_TARGET: http://127.0.0.1:8000
          BACKEND_HEALTH_URL: http://127.0.0.1:8000
          CI: "true"
          CI_E2E: "true"
        run: |
          npx playwright test --workers=1 || true   # não bloqueia até testes E2E existirem

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # 7. CI SUMMARY — gate final
  # ──────────────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, security, backend-sqlite, backend-postgres, frontend]
    if: always()
    steps:
      - name: Check all critical jobs
        run: |
          echo "## CI Summary — Heillon Legal" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend SQLite | ${{ needs.backend-sqlite.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend PostgreSQL | ${{ needs.backend-postgres.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY

          # Fail if critical jobs failed
          if [[ "${{ needs.backend-sqlite.result }}" == "failure" || \
                "${{ needs.backend-postgres.result }}" == "failure" || \
                "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "❌ Critical jobs failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ All critical jobs passed" >> $GITHUB_STEP_SUMMARY
